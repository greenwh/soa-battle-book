<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="og-title">
  <title id="og-title">SOA Battle Book — Whiteout Survival Reference</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#1a1f2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#cc5500"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ambient glow -->
  <ellipse cx="980" cy="320" rx="380" ry="280" fill="url(#glow)"/>

  <!-- decorative phoenix feathers (right side) -->
  <g opacity="0.20" stroke="#ff8800" stroke-width="2" fill="none">
    <path d="M 980,500 C 960,400 1000,300 940,120"/>
    <path d="M 1020,500 C 990,390 1040,280 970,90"/>
    <path d="M 1060,500 C 1030,400 1070,300 1000,100"/>
    <path d="M 1100,500 C 1070,400 1110,290 1040,80"/>
    <path d="M 940,500 C 920,420 950,320 900,150"/>
  </g>

  <!-- top-left brand bar -->
  <rect x="80" y="80" width="60" height="6" fill="url(#accent)" rx="3"/>
  <text x="80" y="130" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#ff8800" letter-spacing="6">
    BATTLE BOOK
  </text>

  <!-- title -->
  <text x="80" y="280" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#e8edf5" letter-spacing="-2">
    Seeds of Anarchy
  </text>
  <text x="80" y="380" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#ff8800" letter-spacing="-2">
    Battle Book
  </text>

  <!-- tagline -->
  <text x="80" y="450" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="28" fill="#a8b3c7">
    Whiteout Survival reference — events, heroes,
  </text>
  <text x="80" y="490" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="28" fill="#a8b3c7">
    combat, and strategy.
  </text>

  <!-- url ribbon -->
  <rect x="80" y="540" width="440" height="40" fill="#1f2533" stroke="#2c3344" rx="6"/>
  <text x="100" y="566" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="18" fill="#ff8800">
    greenwh.github.io/soa-battle-book
  </text>
</svg>
