<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fireGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#cc2200"/>
      <stop offset="50%"  stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffdd00"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background to match site canvas -->
  <rect width="32" height="32" fill="#0d0f14" rx="3"/>

  <!-- Phoenix wings: left wing sweeping upward -->
  <path d="M 15,19 C 12,15 6,10 2,3 C 5,7 8,12 10,15 C 7,9 8,5 10,3 C 11,7 12,11 13,14 C 12,8 13,5 15,4 L 15,18 Z"
        fill="url(#fireGrad)" filter="url(#glow)"/>

  <!-- Phoenix wings: right wing sweeping upward (mirrored) -->
  <path d="M 17,19 C 20,15 26,10 30,3 C 27,7 24,12 22,15 C 25,9 24,5 22,3 C 21,7 20,11 19,14 C 20,8 19,5 17,4 L 17,18 Z"
        fill="url(#fireGrad)" filter="url(#glow)"/>

  <!-- SOA text -->
  <text x="16" y="28"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="10"
        font-weight="bold"
        fill="url(#fireGrad)"
        filter="url(#glow)">SOA</text>
</svg>
