<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="fireGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#cc2200"/>
      <stop offset="50%"  stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffdd00"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#0d0f14" rx="48"/>

  <!-- Phoenix wings: left wing, scaled to 512px -->
  <path d="M 240,300 C 210,250 155,170 110,50 C 135,110 165,195 185,250 C 150,165 155,95 180,55 C 195,115 200,185 215,240 C 200,160 210,95 235,70 L 245,280 Z"
        fill="url(#fireGrad)" filter="url(#glow)"/>

  <!-- Phoenix wings: right wing (mirrored) -->
  <path d="M 272,300 C 302,250 357,170 402,50 C 377,110 347,195 327,250 C 362,165 357,95 332,55 C 317,115 312,185 297,240 C 312,160 302,95 277,70 L 267,280 Z"
        fill="url(#fireGrad)" filter="url(#glow)"/>

  <!-- SOA centered -->
  <text x="256" y="432"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="200"
        font-weight="bold"
        fill="url(#fireGrad)"
        filter="url(#glow)">SOA</text>
</svg>
