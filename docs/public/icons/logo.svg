<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 38">
  <defs>
    <linearGradient id="fireGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#cc2200"/>
      <stop offset="50%"  stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffdd00"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Phoenix wings: left wing centered at x=40 -->
  <path d="M 38,24 C 34,19 25,13 18,3 C 22,9 26,16 29,20 C 24,13 25,7 28,4 C 30,9 31,14 33,18 C 31,11 33,6 36,5 L 38,22 Z"
        fill="url(#fireGrad)" filter="url(#glow)"/>

  <!-- Phoenix wings: right wing (mirrored) -->
  <path d="M 42,24 C 46,19 55,13 62,3 C 58,9 54,16 51,20 C 56,13 55,7 52,4 C 50,9 49,14 47,18 C 49,11 47,6 44,5 L 42,22 Z"
        fill="url(#fireGrad)" filter="url(#glow)"/>

  <!-- SOA text -->
  <text x="40" y="36"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="16"
        font-weight="bold"
        letter-spacing="2"
        fill="url(#fireGrad)"
        filter="url(#glow)">SOA</text>
</svg>
